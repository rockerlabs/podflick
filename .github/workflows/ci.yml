name: CI

# The workflow always runs; the `build-test` job always reports a status. It
# used to be gated by a workflow-level `paths-ignore`, but a workflow skipped
# that way never creates its check run, so a docs-only PR would leave the
# required `build-test` context stuck "Expected — Waiting" once branch
# protection is enabled, blocking the merge forever. Instead we keep the job
# always-running and skip only the *expensive* steps for docs-only diffs (see
# the "Detect build-affecting changes" step) — an always-green skip, same
# check name, so branch protection just requires `build-test` as before.
on:
  pull_request:
  push:
    branches: [main]

# One run per ref; a new push cancels the in-flight run for the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    # Pinned, not `macos-latest`: a CI gate must be reproducible, and the
    # `macos-latest` label migrates to macOS 26 from 2026-06-15, which would
    # swap the toolchain under us without a code change. Bump deliberately.
    runs-on: macos-15
    steps:
      # Full history so the change-detection diff below can reach the base.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Decide whether anything build-affecting changed. Only docs/licenses/
      # images (**.md, docs/**, licenses/**, *.png) → skip the heavy steps and
      # let the job finish green in seconds; anything else (or any uncertainty
      # about the diff range) → `code=true`, run the full build (fail-safe: we
      # never skip CI when unsure).
      - name: Detect build-affecting changes
        id: detect
        run: |
          set -uo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] \
            || [ "$base" = "0000000000000000000000000000000000000000" ] \
            || ! git cat-file -e "$base" 2>/dev/null; then
            echo "Unknown diff base → running full CI (fail-safe)."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$base" HEAD)"
          echo "Changed files:"
          echo "$changed"
          # Keep only build-affecting paths (drop docs/licenses/images). If
          # anything survives, a code path changed → build. (Filter-then-test
          # instead of `grep -qv`: BSD grep's `-q` exit status mishandles `-v`.)
          code_changes="$(printf '%s\n' "$changed" | grep -vE '(\.md$|^docs/|^licenses/|\.png$)' || true)"
          if [ -z "$changed" ]; then
            echo "Empty diff → running full CI (fail-safe)."
            echo "code=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$code_changes" ]; then
            echo "Build-affecting change detected → running full CI."
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "Docs/licenses/images only → skipping build (green)."
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

      # The project is generated by xcodegen (PodFlick.xcodeproj is gitignored).
      - name: Install xcodegen
        if: steps.detect.outputs.code == 'true'
        run: brew install xcodegen

      # project.yml wires a configFile that is gitignored (holds the local team
      # id); CI only builds/tests, so a stub from the committed template is
      # enough for xcodegen to resolve it. No signing secrets are used.
      - name: Stub signing config
        if: steps.detect.outputs.code == 'true'
        run: cp Signing.xcconfig.template Signing.local.xcconfig

      - name: Generate Xcode project
        if: steps.detect.outputs.code == 'true'
        run: xcodegen generate

      # Golden byte-exact check of the reference iTunesDB writer (must stay green).
      - name: Reference DB selftest
        if: steps.detect.outputs.code == 'true'
        run: python3 reference/ipod_db.py --selftest

      # Debug build + full XCTest suite. Signing is disabled — embedding/signing
      # the release .app is a separate, credential-bound pipeline (not CI).
      - name: Build & test
        if: steps.detect.outputs.code == 'true'
        run: |
          xcodebuild \
            -project PodFlick.xcodeproj \
            -scheme PodFlick \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            test
