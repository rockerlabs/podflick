name: CI

on:
  # Skip CI when a change touches only docs/licenses/images — nothing there
  # affects the build, tests, or the reference selftest. Any code path
  # (.swift, project.yml, reference/*.py, scripts/*, this workflow) still runs.
  # Safe here because the repo has no required-status branch protection (free
  # private plan); revisit with an always-green skip job once that's enabled.
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'licenses/**'
      - '**/*.png'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'licenses/**'
      - '**/*.png'

# One run per ref; a new push cancels the in-flight run for the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    # Pinned, not `macos-latest`: a CI gate must be reproducible, and the
    # `macos-latest` label migrates to macOS 26 from 2026-06-15, which would
    # swap the toolchain under us without a code change. Bump deliberately.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # The project is generated by xcodegen (PodFlick.xcodeproj is gitignored).
      - name: Install xcodegen
        run: brew install xcodegen

      # project.yml wires a configFile that is gitignored (holds the local team
      # id); CI only builds/tests, so a stub from the committed template is
      # enough for xcodegen to resolve it. No signing secrets are used.
      - name: Stub signing config
        run: cp Signing.xcconfig.template Signing.local.xcconfig

      - name: Generate Xcode project
        run: xcodegen generate

      # Golden byte-exact check of the reference iTunesDB writer (must stay green).
      - name: Reference DB selftest
        run: python3 reference/ipod_db.py --selftest

      # Debug build + full XCTest suite. Signing is disabled — embedding/signing
      # the release .app is a separate, credential-bound pipeline (not CI).
      - name: Build & test
        run: |
          xcodebuild \
            -project PodFlick.xcodeproj \
            -scheme PodFlick \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            test
