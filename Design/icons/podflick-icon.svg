<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#46c8ff"></stop>
      <stop offset="0.55" stop-color="#3f8bf5"></stop>
      <stop offset="1" stop-color="#3b4fe0"></stop>
    </linearGradient>
    <radialGradient id="topHi" cx="0.5" cy="0.02" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.34"></stop>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="vign" cx="0.5" cy="1" r="0.95">
      <stop offset="0.55" stop-color="#0a1a5a" stop-opacity="0"></stop>
      <stop offset="1" stop-color="#0a1a5a" stop-opacity="0.24"></stop>
    </radialGradient>
    <linearGradient id="mkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"></stop>
      <stop offset="1" stop-color="#eaf1ff"></stop>
    </linearGradient>
    <clipPath id="sq"><rect x="72" y="72" width="880" height="880" rx="200"></rect></clipPath>
    <filter id="sqShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0a1a5a" flood-opacity="0.28"></feDropShadow>
    </filter>
    <filter id="mkShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#0a2050" flood-opacity="0.34"></feDropShadow>
    </filter>
  </defs>

  
  <rect x="72" y="72" width="880" height="880" rx="200" fill="url(#bg)" filter="url(#sqShadow)"></rect>
  <g clip-path="url(#sq)">
    <rect x="72" y="72" width="880" height="880" fill="url(#topHi)"></rect>
    <rect x="72" y="72" width="880" height="880" fill="url(#vign)"></rect>
  </g>

  
  <g filter="url(#mkShadow)">
    <rect x="478" y="280" width="68" height="250" rx="34" fill="url(#mkGrad)"></rect>
    <path d="M 512 671 L 382 461 L 642 461 Z" fill="url(#mkGrad)" stroke="url(#mkGrad)" stroke-width="28" stroke-linejoin="round"></path>
    <rect x="326" y="648" width="372" height="118" rx="30" fill="url(#mkGrad)"></rect>
    <rect x="462" y="690" width="100" height="16" rx="8" fill="#3f8bf5"></rect>
  </g>
</svg>