<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#f6f7f9"></stop>
      <stop offset="0.5" stop-color="#dcdfe4"></stop>
      <stop offset="1" stop-color="#bfc4cc"></stop>
    </linearGradient>
    <radialGradient id="topHi" cx="0.5" cy="0" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"></stop>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="vign" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.5" stop-color="#5a5f68" stop-opacity="0"></stop>
      <stop offset="1" stop-color="#5a5f68" stop-opacity="0.28"></stop>
    </linearGradient>
    <linearGradient id="mk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5c626b"></stop>
      <stop offset="1" stop-color="#34383f"></stop>
    </linearGradient>
    <linearGradient id="mk2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#878d97"></stop>
      <stop offset="1" stop-color="#5a606a"></stop>
    </linearGradient>
    <clipPath id="sq"><rect x="72" y="72" width="880" height="880" rx="200"></rect></clipPath>
    <filter id="sqShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#1a1c22" flood-opacity="0.30"></feDropShadow>
    </filter>
    <filter id="mkShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#20232a" flood-opacity="0.34"></feDropShadow>
    </filter>
  </defs>

  
  <rect x="72" y="72" width="880" height="880" rx="200" fill="url(#bg)" filter="url(#sqShadow)"></rect>
  <g clip-path="url(#sq)">
    <rect x="72" y="74" width="880" height="880" rx="200" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="3"></rect>
    <rect x="72" y="72" width="880" height="880" fill="url(#topHi)"></rect>
    <rect x="72" y="72" width="880" height="880" fill="url(#vign)"></rect>
  </g>

  
  <g clip-path="url(#sq)">
    <g filter="url(#mkShadow)">
      
      <rect x="373" y="392" width="32" height="86" rx="16" fill="url(#mk2)"></rect>
      <rect x="455" y="283" width="32" height="77" rx="16" fill="url(#mk2)"></rect>
      <rect x="455" y="392" width="32" height="86" rx="16" fill="url(#mk2)"></rect>
      <rect x="537" y="336" width="32" height="80" rx="16" fill="url(#mk2)"></rect>
      <rect x="619" y="312" width="32" height="40" rx="16" fill="url(#mk2)"></rect>
      <rect x="619" y="410" width="32" height="68" rx="16" fill="url(#mk2)"></rect>
      
      <path d="M 356 470 L 668 470 L 512 676 Z" fill="url(#mk)" stroke="url(#mk)" stroke-width="28" stroke-linejoin="round"></path>
      
      <rect x="326" y="648" width="372" height="118" rx="30" fill="url(#mk)"></rect>
    </g>
    
    <rect x="462" y="690" width="100" height="16" rx="8" fill="#c9ccd2"></rect>
