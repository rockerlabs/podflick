name: PodFlick
options:
  bundleIdPrefix: com.dbudnikau
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: YES
schemes:
  PodFlick:
    build:
      targets:
        PodFlick: all
    test:
      targets: [PodFlickTests]
targets:
  PodFlick:
    type: application
    platform: macOS
    sources: [Sources]
    configFiles:
      Debug: Signing.local.xcconfig
      Release: Signing.local.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dbudnikau.podflick
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
  PodFlickTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests]
    dependencies:
      - target: PodFlick
