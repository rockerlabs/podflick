name: PodFlick
options:
  bundleIdPrefix: com.dbudnikau
  deploymentTarget:
    macOS: "14.0"
targets:
  PodFlick:
    type: application
    platform: macOS
    sources: [Sources]
    configFiles:
      Debug: Signing.local.xcconfig
      Release: Signing.local.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dbudnikau.podflick
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
