name: PodFlick
options:
  bundleIdPrefix: com.dbudnikau
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: YES
schemes:
  PodFlick:
    build:
      targets:
        PodFlick: all
    test:
      targets: [PodFlickTests]
targets:
  PodFlick:
    type: application
    platform: macOS
    sources: [Sources]
    configFiles:
      Debug: Signing.local.xcconfig
      Release: Signing.local.xcconfig
    # A hand-declared Info.plist (generated by xcodegen from the properties
    # below) instead of GENERATE_INFOPLIST_FILE: NSServices and CFBundleURLTypes
    # are arrays of dictionaries the INFOPLIST_KEY_* scalars can't express.
    info:
      path: Sources/PodFlick/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true
        # Launch as an agent (no Dock icon): a quiet service/URL launch must
        # show NOTHING — the Dock tile otherwise flashes before AppState can
        # switch to .accessory. A normal launch is promoted to .regular (Dock
        # icon + window) in AppState.showMainWindow.
        LSUIElement: true
        # Finder right-click "Transfer to iPod" (B.9). Delivered to the running
        # single instance, so every DB write still funnels through the one
        # DeviceWriteQueue actor. transferToIPod: is the ServiceProvider selector.
        NSServices:
          - NSMenuItem:
              default: Transfer to iPod
            NSMessage: transferToIPod
            NSPortName: PodFlick
            NSSendFileTypes:
              - public.movie
        # podflick:// URL scheme — enables Shortcuts / Automator Quick Actions.
        CFBundleURLTypes:
          - CFBundleURLName: com.dbudnikau.podflick.transfer
            CFBundleURLSchemes:
              - podflick
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dbudnikau.podflick
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
  PodFlickTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests]
    dependencies:
      - target: PodFlick
