name: PodFlick
options:
  bundleIdPrefix: com.dbudnikau
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: YES
schemes:
  PodFlick:
    build:
      targets:
        PodFlick: all
    test:
      targets: [PodFlickTests]
targets:
  PodFlick:
    type: application
    platform: macOS
    sources:
      - Sources
      # The golden single-video fixture doubles as the seed donor DB: adding
      # the first video to a library emptied of videos clones its donor
      # records (IPodLibrary.seedDatabaseURL).
      - path: reference/fixtures/iTunesDB.single-video
        buildPhase: resources
    configFiles:
      Debug: Signing.local.xcconfig
      Release: Signing.local.xcconfig
    # A hand-declared Info.plist (generated by xcodegen from the properties
    # below) instead of GENERATE_INFOPLIST_FILE: NSServices and CFBundleURLTypes
    # are arrays of dictionaries the INFOPLIST_KEY_* scalars can't express.
    info:
      path: Sources/PodFlick/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true
        # Version strings come from the MARKETING_VERSION /
        # CURRENT_PROJECT_VERSION build settings below (single source of
        # truth) rather than being pinned literally here. Xcode expands the
        # $(...) references while processing Info.plist.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Launch as an agent (no Dock icon): a quiet service/URL launch must
        # show NOTHING — the Dock tile otherwise flashes before AppState can
        # switch to .accessory. A normal launch is promoted to .regular (Dock
        # icon + window) in AppState.showMainWindow.
        LSUIElement: true
        # Finder right-click "Transfer to iPod" (B.9). Delivered to the running
        # single instance, so every DB write still funnels through the one
        # DeviceWriteQueue actor. transferToIPod: is the ServiceProvider selector.
        NSServices:
          - NSMenuItem:
              default: Transfer to iPod
            NSMessage: transferToIPod
            NSPortName: PodFlick
            NSSendFileTypes:
              - public.movie
        # podflick:// URL scheme — enables Shortcuts / Automator Quick Actions.
        CFBundleURLTypes:
          - CFBundleURLName: com.dbudnikau.podflick.transfer
            CFBundleURLSchemes:
              - podflick
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dbudnikau.podflick
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Single source of truth for the app version; bump these per release.
        # Wired into CFBundleShortVersionString/CFBundleVersion above.
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        # Hardened runtime is required for Developer ID notarization (B.15 step
        # 4). Scoped to Release only so Debug builds — which sign with an Apple
        # Development cert and attach a debugger — aren't burdened by it. The
        # bundled ffmpeg/ffprobe are exec'd as separate processes, so no runtime
        # exception entitlements are needed; the final device smoke confirms the
        # hardened bundle still launches them.
        Release:
          ENABLE_HARDENED_RUNTIME: YES
  PodFlickTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests]
    dependencies:
      - target: PodFlick
